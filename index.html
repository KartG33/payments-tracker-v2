<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b0c1e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Payments">
<title>Payments</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.png">

<style>
:root {
  --bg:#0b0c1e;--bg2:#0f1028;--bg3:#131430;--card:#0e1030;--cardh:#131540;
  --border:#1c1f3a;--acc:#4f46e5;--acc2:#818cf8;--txt:#e0e4f8;--txt2:#5560a0;
  --txt3:#2d3060;--red:#ef4444;--green:#10b981;--amber:#f59e0b;
  --sans:system-ui,-apple-system,sans-serif;--mono:ui-monospace,'SF Mono',monospace;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--sans);}

/* HEADER */
.hdr{position:sticky;top:0;z-index:50;background:rgba(11,12,30,.97);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);padding:13px 15px 11px;}
.hdr-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.logo{font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--txt2);font-family:var(--mono);}

/* TABS */
.mode-tabs{display:flex;gap:4px;}
.mtab{font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--txt3);cursor:pointer;}
.mtab.on{background:rgba(79,70,229,.18);border-color:var(--acc);color:var(--acc2);}

/* MONTH NAV */
.month-nav{display:none;align-items:center;justify-content:space-between;margin-bottom:10px;}
.month-nav.on{display:flex;}
.mnav-btn{background:var(--bg3);border:1px solid var(--border);color:var(--txt2);width:34px;height:34px;border-radius:10px;cursor:pointer;}
.mnav-lbl{font-family:var(--mono);font-size:13px;color:var(--txt);}

/* SEARCH */
.srch-wrap{position:relative;}
.srch-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--txt3);}
.srch{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:11px;padding:9px 34px;color:var(--txt);}
.srch:focus{border-color:var(--acc);}
.srch-x{position:absolute;right:9px;top:50%;transform:translateY(-50%);display:none;}
.srch-x.on{display:block;}

/* LIST */
.list{padding:10px 13px 90px;}

.card{background:var(--card);border:1px solid var(--border);border-radius:18px;margin-bottom:8px;}
.card.expanded{border-color:rgba(79,70,229,.5);}
.card-main{display:flex;align-items:center;gap:11px;padding:13px 14px;cursor:pointer;}
.c-ico{width:40px;height:40px;border-radius:12px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;}
.c-body{flex:1;min-width:0;}
.c-top{display:flex;justify-content:space-between;}
.c-name{font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-amt{font-family:var(--mono);}
.c-date{font-family:var(--mono);font-size:12px;color:var(--txt2);}

/* EMPTY */
.empty{display:none;text-align:center;padding:70px 20px;color:var(--txt3);}
.empty.on{display:block;}
.empty-t{font-size:15px;color:var(--txt2);margin:14px 0 5px;}
.empty-s{font-family:var(--mono);font-size:12px;}

/* TOOL BUTTONS FIXED */
.tool-btns{
  position:fixed;
  bottom:26px;
  left:18px;
  z-index:100;
  display:flex;
  gap:8px;
}

.t-btn{
  height:40px;
  padding:0 14px;
  border-radius:20px;
  background:var(--bg3);
  border:1px solid var(--border);
  color:var(--txt2);
  font-family:var(--mono);
  font-size:12px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
  transition:all .2s;
}

.t-btn:hover{
  border-color:var(--acc);
  color:var(--acc2);
}

.t-btn:active{
  background:var(--cardh);
  transform:scale(.96);
}

/* FAB */
.fab{
  position:fixed;
  bottom:24px;
  right:18px;
  z-index:100;
  width:54px;
  height:54px;
  border-radius:50%;
  background:var(--acc);
  border:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 4px 22px rgba(79,70,229,.55);
  transition:transform .2s;
}

.fab:active{transform:scale(.94);}
.fab svg{color:#fff;transition:transform .25s;}
.fab.open svg{transform:rotate(45deg);}

/* SHEET */
.sheet{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  z-index:300;
  background:var(--bg2);
  border-top:1px solid var(--border);
  border-radius:22px 22px 0 0;
  padding:0 17px 38px;
  transform:translateY(100%);
  transition:.34s;
}
.sheet.on{transform:translateY(0);}
.sheet-title{padding:20px 0 15px;text-align:center;color:var(--txt2);font-size:13px;font-family:var(--mono);}
.delete-btn{margin-top:10px;background:var(--red);color:#fff;border:none;justify-content:center;height:48px;}
.delete-btn:active{background:var(--red);transform:scale(.96);}

/* OVERLAY */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);display:none;}
.overlay.on{display:block;}

/* TOAST */
.toast{
  position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-10px);
  z-index:500;background:var(--bg3);border:1px solid var(--border);
  border-radius:12px;padding:10px 18px;font-family:var(--mono);font-size:12px;
  color:var(--acc2);opacity:0;transition:.25s;pointer-events:none;white-space:nowrap;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>

</head>

<body>

<div class="hdr">
  <div class="hdr-row1">
    <div class="logo">PAYMENTS TRACKER</div>
    <div class="mode-tabs">
      <div class="mtab on" id="t-all" onclick="setMode('all')">Все</div>
      <div class="mtab" id="t-month" onclick="setMode('month')">Месяц</div>
    </div>
  </div>

  <div class="month-nav" id="m-nav">
    <button class="mnav-btn" onclick="changeMonth(-1)">←</button>
    <div class="mnav-lbl" id="m-lbl">Январь 2024</div>
    <button class="mnav-btn" onclick="changeMonth(1)">→</button>
  </div>

  <div class="srch-wrap">
    <svg class="srch-ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" class="srch" id="srch" placeholder="Поиск сервиса..." oninput="onSrch()">
    <div class="srch-x" id="srch-x" onclick="clearSrch()">✕</div>
  </div>
</div>

<div class="list" id="list"></div>
<div class="toast" id="toast"></div>

<div class="tool-btns">
  <button class="t-btn" onclick="exportXlsx()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Экспорт
  </button>
  <button class="t-btn" onclick="document.getElementById('xf').click()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Импорт <span id="xfn" style="font-size:10px;color:var(--acc2);margin-left:2px"></span>
  </button>
  <input type="file" id="xf" accept=".xlsx" style="display:none" onchange="importX(this)">
</div>

<button class="fab" id="fab" onclick="toggleSh()">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
</button>

<div class="overlay" id="overlay" onclick="closeSh()"></div>

<div class="sheet" id="sheet">
  <div id="sheet-title" class="sheet-title">НОВЫЙ ПЛАТЕЖ</div>
  <input type="hidden" id="f-id">
  <input type="date" id="f-date" class="srch" style="margin-bottom:10px;padding-left:15px">
  <input type="text" id="f-svc" class="srch" placeholder="Название сервиса" style="margin-bottom:10px;padding-left:15px">
  <input type="number" id="f-amt" class="srch" placeholder="Сумма" style="margin-bottom:20px;padding-left:15px">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <button class="t-btn" style="justify-content:center;height:48px" onclick="closeSh()">Отмена</button>
    <button class="t-btn" style="justify-content:center;height:48px;background:var(--acc);color:#fff;border:none" onclick="saveEntry()">Сохранить</button>
  </div>
  <button class="t-btn delete-btn" id="delete-btn" onclick="deleteEntry()" style="display:none;width:100%">Удалить платеж</button>
</div>

<script>
// ─── IndexedDB ────────────────────────────────────────────────────────────────
const DB_NAME = 'payments-db';
const DB_VER  = 1;
const STORE   = 'payments';

let db = null;

function openDB() {
  return new Promise((res, rej) => {
    if (db) return res(db);
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        const store = d.createObjectStore(STORE, { keyPath: 'id' });
        store.createIndex('date', 'date', { unique: false });
      }
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror   = e => rej(e.target.error);
  });
}

async function dbGetAll() {
  const d = await openDB();
  return new Promise((res, rej) => {
    const tx  = d.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => res(req.result || []);
    req.onerror   = e => rej(e.target.error);
  });
}

async function dbPut(record) {
  const d = await openDB();
  return new Promise((res, rej) => {
    const tx  = d.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).put(record);
    req.onsuccess = () => res();
    req.onerror   = e => rej(e.target.error);
  });
}

async function dbDelete(id) {
  const d = await openDB();
  return new Promise((res, rej) => {
    const tx  = d.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).delete(id);
    req.onsuccess = () => res();
    req.onerror   = e => rej(e.target.error);
  });
}

// Миграция из localStorage (одноразово)
async function migrateFromLocalStorage() {
  try {
    const old = localStorage.getItem('payments');
    if (!old) return;
    const arr = JSON.parse(old);
    if (!arr || !arr.length) return;
    for (const r of arr) {
      if (r && r.id) await dbPut(r);
    }
    localStorage.removeItem('payments');
    showToast(`Мигрировано ${arr.length} записей`);
  } catch(e) { /* silent */ }
}

// ─── APP STATE ────────────────────────────────────────────────────────────────
let P = [];
let mode = 'all', curMonth = new Date().toISOString().slice(0, 7);

// ─── ICONS ───────────────────────────────────────────────────────────────────
const IC = [
  [['google','youtube'],'🔴'],[['netflix'],'🎬'],[['spotify'],'🎧'],[['apple','icloud'],'🍎'],
  [['amazon','aws'],'📦'],[['microsoft','xbox','office'],'🪟'],[['telegram'],'✈️'],
  [['notion'],'📝'],[['figma'],'🎨'],[['github'],'🐙'],[['dropbox'],'📦'],
  [['adobe'],'🅰️'],[['openai','chatgpt'],'🤖'],[['claude','anthropic'],'🧠'],
];
function ico(s){ const l=(s||'').toLowerCase(); const f=IC.find(([k])=>k.some(k=>l.includes(k))); return f?f[1]:'💳'; }

const _cur = new Intl.NumberFormat('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
function fa(n) { return _cur.format(n || 0); }
function fd(d){if(!d)return'—';const[y,m,day]=d.split('-');return`${parseInt(day)} ${['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][parseInt(m)-1]} ${y}`;}

// ─── TOAST ───────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('on'), 2500);
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  const list = document.getElementById('list');
  const filtered = filteredRows();
  list.innerHTML = filtered.length ? '' : '<div class="empty on"><div class="empty-t">Ничего не найдено</div></div>';

  filtered.sort((a,b) => b.date.localeCompare(a.date)).forEach(r => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div class="card-main" onclick="editEntry('${r.id}')">
        <div class="c-ico">${ico(r.service)}</div>
        <div class="c-body">
          <div class="c-top"><span class="c-name">${r.service}</span><span class="c-amt">${fa(r.amount)}</span></div>
          <div class="c-date">${fd(r.date)}</div>
        </div>
      </div>
    `;
    list.appendChild(div);
  });
}

function filteredRows(){
  const q = document.getElementById('srch').value.toLowerCase();
  return P.filter(r => {
    const matchQ = r.service.toLowerCase().includes(q);
    const matchM = mode === 'month' ? r.date.startsWith(curMonth) : true;
    return matchQ && matchM;
  });
}

// ─── MODES ───────────────────────────────────────────────────────────────────
function setMode(m){
  mode = m;
  document.getElementById('t-all').classList.toggle('on', m==='all');
  document.getElementById('t-month').classList.toggle('on', m==='month');
  document.getElementById('m-nav').classList.toggle('on', m==='month');
  render();
}

function changeMonth(delta){
  let [y, m] = curMonth.split('-').map(Number);
  m += delta;
  if(m>12){m=1;y++} else if(m<1){m=12;y--}
  curMonth = `${y}-${String(m).padStart(2,'0')}`;
  const names = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  document.getElementById('m-lbl').textContent = `${names[m-1]} ${y}`;
  render();
}

function onSrch(){
  document.getElementById('srch-x').classList.toggle('on', !!document.getElementById('srch').value);
  render();
}

function clearSrch(){
  document.getElementById('srch').value = '';
  onSrch();
}

// ─── SHEET ───────────────────────────────────────────────────────────────────
function toggleSh(){
  const sheet = document.getElementById('sheet');
  const fab   = document.getElementById('fab');
  const ov    = document.getElementById('overlay');
  sheet.classList.toggle('on');
  fab.classList.toggle('open');
  ov.classList.toggle('on');
  if(sheet.classList.contains('on')){
    document.getElementById('sheet-title').textContent = 'НОВЫЙ ПЛАТЕЖ';
    document.getElementById('f-id').value = '';
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('f-svc').value = '';
    document.getElementById('f-amt').value = '';
    document.getElementById('delete-btn').style.display = 'none';
  }
}

function closeSh(){
  document.getElementById('sheet').classList.remove('on');
  document.getElementById('fab').classList.remove('open');
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('f-id').value = '';
  document.getElementById('f-date').value = '';
  document.getElementById('f-svc').value = '';
  document.getElementById('f-amt').value = '';
}

// ─── CRUD ────────────────────────────────────────────────────────────────────
async function saveEntry(){
  const id  = document.getElementById('f-id').value;
  const date= document.getElementById('f-date').value;
  const svc = document.getElementById('f-svc').value.trim();
  const amt = parseFloat(document.getElementById('f-amt').value);
  if(!date || !svc || isNaN(amt)) return;

  if (id) {
    const idx = P.findIndex(p => p.id === id);
    if (idx !== -1) {
      P[idx] = { ...P[idx], date, service: svc, amount: amt };
      await dbPut(P[idx]);
    }
  } else {
    const rec = { id: crypto.randomUUID(), date, service: svc, amount: amt };
    P.push(rec);
    await dbPut(rec);
  }
  closeSh();
  render();
}

function editEntry(id){
  const payment = P.find(p => p.id === id);
  if (!payment) return;
  document.getElementById('sheet-title').textContent = 'РЕДАКТИРОВАТЬ ПЛАТЕЖ';
  document.getElementById('f-id').value = payment.id;
  document.getElementById('f-date').value = payment.date;
  document.getElementById('f-svc').value = payment.service;
  document.getElementById('f-amt').value = payment.amount;
  document.getElementById('delete-btn').style.display = 'flex';
  toggleSh();
}

async function deleteEntry(){
  const id = document.getElementById('f-id').value;
  if (!id) return;
  if (confirm('Удалить этот платеж?')) {
    await dbDelete(id);
    P = P.filter(p => p.id !== id);
    closeSh();
    render();
  }
}

// ─── XLSX ────────────────────────────────────────────────────────────────────
function loadXLSX(){
  return new Promise((res, rej) => {
    if(window.XLSX) return res();
    const s = document.createElement('script');
    s.src = 'https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js';
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

function importX(inp){
  const f=inp.files[0]; if(!f) return;
  const st=document.getElementById('xfn'); st.textContent='...';
  loadXLSX().then(()=>{
    const r=new FileReader();
    r.onload=async e=>{
      try {
        const wb=XLSX.read(e.target.result,{type:'array',cellDates:true}),
              ws=wb.Sheets[wb.SheetNames[0]],
              rows=XLSX.utils.sheet_to_json(ws,{header:1});
        if(!rows.length) return;
        const h=rows[0].map(v=>String(v||'').toLowerCase().trim());
        const iID=h.indexOf('id'), iDt=h.indexOf('дата'), iSv=h.indexOf('сервис'), iAm=h.indexOf('сумма');
        if(iDt===-1||iSv===-1||iAm===-1){ st.textContent='⚠ Формат?'; return; }
        let n=0,u=0;
        const ops = [];
        rows.slice(1).forEach(row=>{
          let d=row[iDt], ds='';
          if(d instanceof Date) ds=d.toISOString().split('T')[0];
          else if(typeof d==='number'){ const dt=new Date(Math.round((d-25569)*86400*1000)); ds=dt.toISOString().split('T')[0]; }
          else ds=String(d||'').trim();
          if(!ds||ds.length<10) return;
          const rid=iID>-1?String(row[iID]||'').trim():'',
                svc=String(row[iSv]||'').trim(),
                amt=parseFloat(String(row[iAm]||'0').replace(',','.'));
          if(!svc||isNaN(amt)) return;
          const exIdx=P.findIndex(x=>rid&&x.id===rid);
          if(exIdx>-1){
            P[exIdx]={...P[exIdx],date:ds,service:svc,amount:amt};
            ops.push(dbPut(P[exIdx]));
            u++;
          } else if(!P.some(x=>x.date===ds&&x.service===svc&&Math.abs(x.amount-amt)<0.1)){
            const rec={id:rid||crypto.randomUUID(),date:ds,service:svc,amount:amt};
            P.push(rec);
            ops.push(dbPut(rec));
            n++;
          }
        });
        await Promise.all(ops);
        st.textContent=`+${n}/~${u}`;
        showToast(`Импорт: +${n} новых, ~${u} обновлено`);
        render();
      } catch(err){ st.textContent='⚠ Ошибка'; } finally { inp.value=''; }
    };
    r.readAsArrayBuffer(f);
  }).catch(()=>st.textContent='⚠ Сеть');
}

function exportXlsx(){
  loadXLSX().then(()=>{
    const rows=filteredRows(),
          data=[['ID','Дата','Сервис','Сумма'],...rows.map(r=>[r.id,r.date,r.service,r.amount])],
          ws=XLSX.utils.aoa_to_sheet(data);
    ws['!cols']=[{wch:20},{wch:12},{wch:36},{wch:12}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'payments');
    XLSX.writeFile(wb,`Payments_${new Date().toISOString().slice(0,10)}.xlsx`);
  }).catch(()=>alert('Нет сети'));
}

// ─── INIT ────────────────────────────────────────────────────────────────────
async function init() {
  await migrateFromLocalStorage();
  P = await dbGetAll();
  render();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
}

init();
</script>

</body>
</html>
